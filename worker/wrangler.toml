name = "linkforge-worker"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# KV Namespaces (create via wrangler kv:namespace create)
[[kv_namespaces]]
binding = "LINKS_KV"
id = "your_kv_namespace_id"

