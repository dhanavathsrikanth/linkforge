name: Analytics Flush

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  flush:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Flush API
        env:
          INTERNAL_SECRET: ${{ fromJson(toJson(secrets)).INTERNAL_SECRET }}
          APP_URL: ${{ fromJson(toJson(secrets)).APP_URL }}
        run: |
          curl -X POST "${APP_URL}/api/analytics/flush" \
          -H "Authorization: Bearer ${INTERNAL_SECRET}" \
          -H "Content-Type: application/json"
